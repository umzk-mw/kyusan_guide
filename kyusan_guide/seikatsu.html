<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生生活 - 九産大 学生生活ガイド</title>
    <link rel="stylesheet" href="style.css">
    <style>
        details { margin-bottom: 12px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        summary { padding: 16px; font-weight: bold; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: "＋"; color: #a0aec0; }
        details[open] summary::after { content: "－"; color: #004494; }
        .content { padding: 16px; border-top: 1px solid #edf2f7; font-size: 0.95rem; background-color: #fafbfc; }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #004494; font-size: 0.9rem; font-weight: bold; }
        .facility-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 0; list-style: none; margin: 10px 0 0 0; }
        .facility-list li { background: #e9ecef; padding: 5px 12px; border-radius: 15px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅ トップページへ戻る</a>
        <header>
            <h1>🌸 学生生活</h1>
            <p>窓口・ATMの場所や学内施設について</p>
        </header>

        <div style="margin-top: 20px;">
            <details>
                <summary>各種窓口・ATM</summary>
                <div class="content">
                    <p>教務課や学生部など、困ったときの連絡先や、学内ATMの場所と営業時間を記載します。</p>
                </div>
            </details>
            <details>
                <summary>学内施設一覧</summary>
                <div class="content">
                    <p>学内の主要な施設です：</p>
                    <ul class="facility-list">
                        <li>キャリア支援センター</li>
                        <li>美術館</li>
                        <li>図書館</li>
                        <li>アリーナ</li>
                        <li>中央会館</li>
                        <li>運動場</li>
                    </ul>
                </div>
            </details>
        </div>
        <footer><p>© 2026 九産大 Q&A</p></footer>
    </div>
</body>
</html>
